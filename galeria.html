<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria | NIDORA</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; background-color: #000; color: white; font-family: 'Montserrat', sans-serif;
        }

        /* MENU */
        .top-nav { position: absolute; top: 40px; width: 100%; text-align: center; z-index: 20; }
        .top-nav a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 0.75rem; font-weight: 300; letter-spacing: 0.25rem; text-transform: uppercase; transition: 0.3s; padding: 0 15px; }
        .top-nav a:hover { color: #fff; }
        .nav-separator { color: rgba(255, 255, 255, 0.2); font-weight: 200; font-size: 0.8rem; }

        /* SEKCJA GALERIA */
        .gallery-section { padding: 120px 10% 50px; text-align: center; }
        h1 { font-weight: 200; letter-spacing: 0.3rem; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 20px; }
        .divider { width: 80px; height: 1px; background-color: rgba(255, 255, 255, 0.4); margin: 0 auto 40px auto; }
        p.subtitle { font-weight: 300; opacity: 0.7; letter-spacing: 0.1rem; margin-bottom: 60px; }

        /* SIATKA ZDJĘĆ */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            aspect-ratio: 1 / 1; /* Wymusza idealny kwadrat */
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.4s;
            cursor: pointer;
        }

        /* Efekt najechania myszką */
        .gallery-item:hover {
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
            z-index: 2;
        }

        .gallery-item span {
            font-weight: 200;
            letter-spacing: 0.1rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        /* Obrazek w galerii (na przyszłość) */
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Sprawia, że zdjęcie ładnie wypełnia kwadrat */
            opacity: 0.7;
            transition: 0.4s;
        }
        
        .gallery-item:hover img {
            opacity: 1;
        }

        /* IKONA KOSZYKA - NAPRAWA ROZMIARU I KOLORU */
        .cart-icon {
            position: absolute;
            top: 40px;
            right: 5%;
            color: white; /* Zmienia fiolet na biały */
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
            z-index: 30;
        }

        .cart-icon:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .cart-icon svg {
            width: 24px;  /* Blokuje rozrost ikony na całą stronę */
            height: 24px;
        }

        .cart-count {
            background: rgba(255, 255, 255, 0.2);
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: 300;
        }
    </style>
</head>
<body>

   <nav class="top-nav">
        <a href="index.html">Strona Główna</a>
        <span class="nav-separator">|</span>
        <a href="produkty.html">Produkty</a>
        <span class="nav-separator">|</span>
        <a href="galeria.html">Galeria</a>
        <span class="nav-separator">|</span>
        <a href="kontakt.html">Kontakt</a>
    </nav>

    <a href="koszyk.html" class="cart-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
        </svg>
        <span class="cart-count">1</span>
    </a>

    <section class="gallery-section">
        <h1>Nasze Realizacje</h1>
        <div class="divider"></div>
        <p class="subtitle">Każdy projekt to inna historia. Odkryj biżuterię, którą stworzyliśmy dla naszych klientów.</p>

        <div class="gallery-grid">
            <div class="gallery-item"><span>Projekt #01</span></div>
            <div class="gallery-item"><span>Projekt #02</span></div>
            <div class="gallery-item"><span>Projekt #03</span></div>
            <div class="gallery-item"><span>Projekt #04</span></div>
            <div class="gallery-item"><span>Projekt #05</span></div>
            <div class="gallery-item"><span>Projekt #06</span></div>
        </div>
    </section>

</body>
</html>
