

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIDORA | Biżuteria Sentymentalna</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            /* Tło z Twoim pyłem na całą stronę */
            background-image: url('pyl.jpeg'); 
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 200; /* Bardzo cienka czcionka */
            letter-spacing: 0.8rem; /* Rozstrzelone litery dla efektu premium */
            margin: 0;
            text-transform: uppercase;
        }

        .divider {
            width: 80px; /* Szerokość kreski */
            height: 1px;
            background-color: rgba(255, 255, 255, 0.4); /* Subtelna, półprzezroczysta biel */
            margin: 40px auto; /* Odstęp góra/dół */
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.1rem;
            margin: 0;
            opacity: 0.9;
        }

        /* --- Shimmer / sparkle effect --- */
        .sparkle-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
 
        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: white;
            opacity: 0;
            animation: shimmer var(--dur, 2s) var(--delay, 0s) infinite ease-in-out;
            box-shadow:
                0 0 3px 1px rgba(255, 255, 255, 0.6),
                0 0 8px 2px rgba(200, 220, 255, 0.3);
        }
 
        .sparkle.big {
            width: 4px;
            height: 4px;
            box-shadow:
                0 0 4px 2px rgba(255, 255, 255, 0.8),
                0 0 12px 4px rgba(180, 210, 255, 0.4);
        }
 
        .sparkle.tiny {
            width: 2px;
            height: 2px;
            box-shadow:
                0 0 2px 1px rgba(255, 255, 255, 0.5),
                0 0 5px 1px rgba(200, 220, 255, 0.2);
        }
 
        @keyframes shimmer {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }
 
        /* Second animation variant for variety */
        .sparkle.alt {
            animation-name: shimmer2;
        }
 
        @keyframes shimmer2 {
            0%, 100% { opacity: 0; transform: scale(0.8) rotate(0deg); }
            30% { opacity: 0.6; }
            50% { opacity: 1; transform: scale(1.4) rotate(45deg); }
            70% { opacity: 0.5; }
        }
 
        /* Diamond-shaped sparkles */
        .sparkle.diamond {
            width: 5px;
            height: 5px;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            animation-name: shimmerDiamond;
        }
        .sparkle.diamond::before,
        .sparkle.diamond::after {
            content: '';
            position: absolute;
            background: white;
        }
        .sparkle.diamond::before {
            width: 5px;
            height: 1px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            box-shadow: 0 0 4px 1px rgba(255,255,255,0.6);
        }
        .sparkle.diamond::after {
            width: 1px;
            height: 5px;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            box-shadow: 0 0 4px 1px rgba(255,255,255,0.6);
        }
 
        @keyframes shimmerDiamond {
            0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.5) rotate(45deg); }
        }
 
        .container {
            z-index: 1;
            position: relative;
        }
    </style>
</head>
