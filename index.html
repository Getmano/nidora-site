<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nidora - Biżuteria Sentymentalna</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Georgia', serif; /* Elegancka czcionka */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: url('pyl.jpg');
            background-size: cover;
            background-position: bottom center;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        p {
            font-style: italic;
            opacity: 0.8;
        }
        .btn {
            margin-top: 30px;
            padding: 10px 25px;
            border: 1px solid #ffffff;
            color: #ffffff;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn:hover {
            background: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>
    <h1>NIDORA</h1>
    <p>Najpiękniejsze wspomnienia zamknięte w srebrze</p>
    <!-- <a href="https://instagram.com/TWOJ_PROFIL" class="btn">ZAMÓW PAMIĄTKĘ</a> -->
</body>
</html>
