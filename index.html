        body, html {
            margin: 0;

            width: 100%;

        .container {

        h1 {

            letter-spacing: 0.8rem; /* Rozstrzelone litery dla efektu premium */
            margin: 0;
            text-transform: uppercase;
        }

        .divider {
            width: 80px; /* Szerokość kreski */
            height: 1px;
            background-color: rgba(255, 255, 255, 0.4); /* Subtelna, półprzezroczysta biel */
            margin: 40px auto; /* Odstęp góra/dół */
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.1rem;
            margin: 0;
            opacity: 0.9;
        }

        /* Opcjonalny przycisk Instagrama - ukryty, jeśli chcesz tylko napis */
        .social-link {
            position: absolute;
            bottom: 30px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }
        .social-link:hover {
            border-bottom: 1px solid white;
            color: white;
        }

        /* --- Shimmer / sparkle effect --- */
        .sparkle-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .sparkle {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: white;
            opacity: 0;
            animation: shimmer var(--dur, 2s) var(--delay, 0s) infinite ease-in-out;
            box-shadow:
                0 0 2px 1px rgba(255, 255, 255, 0.5),
                0 0 4px 1px rgba(200, 220, 255, 0.2);
        }

        .sparkle.big {
            width: 3px;
            height: 3px;
            box-shadow:
                0 0 3px 1px rgba(255, 255, 255, 0.6),
                0 0 6px 2px rgba(180, 210, 255, 0.25);
        }

        .sparkle.tiny {
            width: 1px;
            height: 1px;
            box-shadow:
                0 0 1px 1px rgba(255, 255, 255, 0.4),
                0 0 3px 1px rgba(200, 220, 255, 0.15);
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.9; transform: scale(1); }
        }

        /* Second animation variant for variety */
        .sparkle.alt {
            animation-name: shimmer2;
        }

        @keyframes shimmer2 {
            0%, 100% { opacity: 0; transform: scale(0.6) rotate(0deg); }
            30% { opacity: 0.5; }
            50% { opacity: 0.9; transform: scale(1) rotate(45deg); }
            70% { opacity: 0.4; }
        }

        /* Diamond-shaped sparkles */
        .sparkle.diamond {
            width: 3px;
            height: 3px;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            animation-name: shimmerDiamond;
        }
        .sparkle.diamond::before,
        .sparkle.diamond::after {
            content: '';
            position: absolute;
            background: white;
        }
        .sparkle.diamond::before {
            width: 3px;
            height: 1px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            box-shadow: 0 0 2px 1px rgba(255,255,255,0.4);
        }
        .sparkle.diamond::after {
            width: 1px;
            height: 3px;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
            box-shadow: 0 0 2px 1px rgba(255,255,255,0.4);
        }

        @keyframes shimmerDiamond {
            0%, 100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
            50% { opacity: 0.85; transform: scale(1.1) rotate(45deg); }
        }

        .container {
            z-index: 1;
            position: relative;
        }
    </style>
</head>
