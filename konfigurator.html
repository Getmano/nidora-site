<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NIDORA | Konfigurator Pierścionka</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #fff;
            color: black;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* LEWA STRONA - 3D */
        .configurator-area {
            flex: 2;
            position: relative;
            background: radial-gradient(circle at center, #eee 0%, #fff 100%);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #canvas-container:active { cursor: grabbing; }

        /* PRAWA STRONA - MENU (Zmieniono na przewijaną, by zmieścić edytor) */
        .sidebar {
            flex: 1;
            background-color: #f9f9f9;
            border-left: 1px solid rgba(0, 0, 0, 0.1);
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto; /* Pozwala na przewijanie paska, gdy rozwinie się edytor */
        }

        .top-nav a {
            color: rgba(0, 0, 0, 0.5);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            display: inline-block;
            transition: 0.3s;
        }
        .top-nav a:hover { color: black; }

        .sidebar h2 {
            font-weight: 200;
            letter-spacing: 0.3rem;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .model-card {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .model-card:hover, .model-card.active {
            border-color: rgba(0, 0, 0, 0.8);
            background: #f0f0f0;
        }

        .model-card h3 {
            margin: 0 0 5px 0;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 0.1rem;
        }

        .model-card p {
            margin: 0;
            font-size: 0.8rem;
            color: #666;
            font-weight: 300;
        }

        /* Sekcja wgrywania i kadrowania */
        .customization-section {
            margin-top: 20px;
            padding-top: 30px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .action-btn {
            background: transparent;
            color: black;
            border: 1px solid rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .action-btn:hover {
            background: black;
            color: white;
        }

        .action-btn.primary {
            background: black;
            color: white;
            margin-top: 15px;
            font-weight: 400;
        }
        
        .action-btn.primary:hover {
            background: #333;
        }

        #photo-input { display: none; }

        /* Edytor zdjęć */
        #cropper-container {
            display: none; /* Ukryte do momentu wgrania zdjęcia */
            margin-top: 20px;
        }

        .img-container {
            width: 100%;
            max-height: 300px;
            background-color: #eee;
            margin-bottom: 15px;
        }

        .img-container img {
            max-width: 100%;
        }

        /* Magia CSS: Wymuszamy okrągły wygląd ramki kadrowania */
        .cropper-view-box,
        .cropper-face {
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="configurator-area">
        <div id="canvas-container"></div>
    </div>

    <div class="sidebar">
        <div class="top-nav">
            <a href="produkty.html">← Wróć do produktów</a>
        </div>
        
        <h2>1. Kształt</h2>
        
        <div class="model-card active" onclick="zmienModel('klasyczny')">
            <h3>Model Klasyczny</h3>
            <p>Okrągłe oczko, delikatna obrączka.</p>
        </div>
        
        <div class="model-card" onclick="zmienModel('masywny')">
            <h3>Sygnet Wspomnień</h3>
            <p>Masywniejsza forma, grubsza obrączka.</p>
        </div>

        <div class="customization-section">
            <h2>2. Twoje Wspomnienie</h2>
            
            <label for="photo-input" class="action-btn">Wybierz zdjęcie</label>
            <input type="file" id="photo-input" accept="image/*">
            
            <div id="cropper-container">
                <p style="font-size: 0.8rem; margin-bottom: 10px; color: #666;">Przesuń i powiększ zdjęcie, aby dopasować je do okrągłego oczka:</p>
                <div class="img-container">
                    <img id="image-to-crop" src="">
                </div>
                <button id="apply-crop" class="action-btn primary">Nałóż na pierścionek</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        // --- USTAWIENIA SCENY 3D ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 15, 30); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;

        // --- OŚWIETLENIE SREBRA ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1);
        dirLight1.position.set(10, 20, 10);
        scene.add(dirLight1);
        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight2.position.set(-15, 5, -15);
        scene.add(dirLight2);
        const dirLight3 = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight3.position.set(0, -10, 15);
        scene.add(dirLight3);

        // --- MATERIAŁY ---
        const silverMaterial = new THREE.MeshPhongMaterial({
            color: 0xdddddd, specular: 0xffffff, shininess: 100
        });

        // Materiał zdjęcia (zaczynamy od ładnego szarego tła, by nie straszyło czernią)
        const photoMaterial = new THREE.MeshPhongMaterial({
            color: 0xaaaaaa, specular: 0x333333, shininess: 10
        });

        // --- BUDOWA PIERŚCIONKA ---
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        function zbudujPierscionek(gruboscObraczki, rozmiarOczka) {
            while(ringGroup.children.length > 0) ringGroup.remove(ringGroup.children[0]); 

            const obraczkaGeo = new THREE.TorusGeometry(6, gruboscObraczki, 64, 100);
            const obraczka = new THREE.Mesh(obraczkaGeo, silverMaterial);
            ringGroup.add(obraczka);

            const oprawaGeo = new THREE.CylinderGeometry(rozmiarOczka + 0.5, rozmiarOczka + 0.3, 1, 64);
            const oprawa = new THREE.Mesh(oprawaGeo, silverMaterial);
            oprawa.position.y = 6 + (gruboscObraczki * 0.5); 
            ringGroup.add(oprawa);

            const zdjecieGeo = new THREE.CircleGeometry(rozmiarOczka, 64);
            const zdjeciePowierzchnia = new THREE.Mesh(zdjecieGeo, photoMaterial);
            zdjeciePowierzchnia.rotation.x = -Math.PI / 2;
            zdjeciePowierzchnia.position.y = oprawa.position.y + 0.51; 
            ringGroup.add(zdjeciePowierzchnia);
            
            ringGroup.rotation.x = 0.4;
            ringGroup.rotation.y = -0.4;
        }

        zbudujPierscionek(1.2, 3);

        // --- ZMIANA MODELU ---
        window.zmienModel = function(typ) {
            document.querySelectorAll('.model-card').forEach(karta => karta.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (typ === 'klasyczny') zbudujPierscionek(1.2, 3);
            else if (typ === 'masywny') zbudujPierscionek(2.5, 4.5);
        };

        // --- KADROWANIE ZDJĘCIA (CROPPER.JS) ---
        let cropper; // Zmienna przechowująca nasz edytor
        const imageToCrop = document.getElementById('image-to-crop');
        const cropperContainer = document.getElementById('cropper-container');

        // 1. Kiedy klient wybierze plik z dysku:
        document.getElementById('photo-input').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Wrzucamy zdjęcie do ukrytego kontenera
                    imageToCrop.src = e.target.result;
                    // Odkrywamy sekcję edytora
                    cropperContainer.style.display = 'block';

                    // Jeśli edytor był już wcześniej uruchomiony (np. klient wgrywa drugie zdjęcie), niszczymy stary
                    if (cropper) {
                        cropper.destroy();
                    }

                    // Uruchamiamy narzędzie do kadrowania
                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: 1, // Wymuszamy idealny kwadrat (który CSS wyświetla jako koło)
                        viewMode: 1, // Zdjęcie nie może uciec poza ramkę
                        dragMode: 'move', // Klient przesuwa zdjęcie, a nie rysuje ramkę
                        guides: false, // Wyłączamy siatkę ułatwiającą (wygląda lepiej bez niej)
                        center: false,
                        cropBoxMovable: false, // Ramka stoi w miejscu
                        cropBoxResizable: false, // Klient nie może zmienić kształtu ramki
                        toggleDragModeOnDblclick: false
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        // 2. Kiedy klient kliknie "Nałóż na pierścionek":
        document.getElementById('apply-crop').addEventListener('click', function() {
            if (!cropper) return;

            // Edytor wycina zaznaczony fragment i zamienia go na nowy plik
            const croppedCanvas = cropper.getCroppedCanvas({
                width: 512, // Ustawiamy optymalną jakość dla 3D
                height: 512
            });

            // Nakładamy wycięte zdjęcie na materiał 3D
            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(croppedCanvas.toDataURL(), function(texture) {
                photoMaterial.map = texture;
                photoMaterial.color.setHex(0xffffff); // Aby kolory zdjęcia były naturalne
                photoMaterial.needsUpdate = true;
            });
        });

        // --- ANIMACJA ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            // Lekki obrót tylko wtedy, gdy klient niczego nie edytuje
            if(cropperContainer.style.display !== 'block') {
                ringGroup.rotation.y += 0.002;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
