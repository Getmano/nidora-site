<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NIDORA | Konfigurator 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; display: flex; }
        .configurator-area { flex: 2; position: relative; background: #000; }
        #canvas-container { width: 100%; height: 100%; cursor: grab; }
        .sidebar { flex: 1; background-color: #0c0d10; border-left: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; overflow-y: auto; box-sizing: border-box; }
        .top-nav a { color: rgba(255, 255, 255, 0.5); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.2rem; text-transform: uppercase; margin-bottom: 40px; display: inline-block; }
        h2 { font-weight: 200; letter-spacing: 0.3rem; font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; text-transform: uppercase; }
        .model-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; margin-bottom: 15px; cursor: pointer; }
        .model-card.active { border-color: white; background: rgba(255, 255, 255, 0.1); }
        .action-btn { background: transparent; color: white; border: 1px solid white; padding: 15px; width: 100%; cursor: pointer; font-family: 'Montserrat'; text-transform: uppercase; letter-spacing: 0.1rem; margin-top: 10px; transition: 0.3s; }
        .action-btn:hover { background: white; color: black; }
        .action-btn.primary { background: white; color: black; font-weight: 400; }
        #cropper-container { display: none; margin-top: 20px; }
        .img-container { width: 100%; max-height: 300px; background: #222; margin-bottom: 15px; }
        .cropper-view-box, .cropper-face { border-radius: 50%; }
    </style>
</head>
<body>

    <div class="configurator-area">
        <div id="canvas-container"></div>
    </div>

    <div class="sidebar">
        <div class="top-nav"><a href="produkty.html">← Wróć do produktów</a></div>
        <h2>1. Kształt</h2>
        <div class="model-card active">
            <h3>Model Precyzyjny</h3>
            <p>Śr. 19.8mm | Drut 1.9mm</p>
        </div>

        <div class="customization-section">
            <h2>2. Zdjęcie</h2>
            <label for="photo-input" class="action-btn">Wybierz zdjęcie</label>
            <input type="file" id="photo-input" style="display:none" accept="image/*">
            
            <div id="cropper-container">
                <div class="img-container"><img id="image-to-crop"></div>
                <button id="apply-crop" class="action-btn primary">Nałóż na pierścionek</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- ROZWIĄZANIE PROBLEMU CZERNI: GENERATOR OTOCZENIA ---
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new THREE.Scene()).texture;

        // ŚWIATŁA
        const light1 = new THREE.PointLight(0xffffff, 2); light1.position.set(10, 20, 10); scene.add(light1);
        const light2 = new THREE.PointLight(0xffffff, 1.5); light2.position.set(-10, 5, 5); scene.add(light2);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // MATERIAŁY
        const silverMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff, metalness: 1, roughness: 0.05
        });
        const photoMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });

        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        function zbudujPierscionek() {
            while(ringGroup.children.length > 0) ringGroup.remove(ringGroup.children[0]);
            
            const gruboscDrutu = 0.95; 
            const srednicaRing = 9.9;
            const srednicaWewMiseczki = 2.05; 
            const glebokoscMiseczki = 1.8;

            const ringGeo = new THREE.TorusGeometry(srednicaRing, gruboscDrutu, 64, 100);
            ringGroup.add(new THREE.Mesh(ringGeo, silverMaterial));

            const oprawaGeo = new THREE.CylinderGeometry(srednicaWewMiseczki + 0.4, srednicaWewMiseczki + 0.3, glebokoscMiseczki, 64);
            const oprawa = new THREE.Mesh(oprawaGeo, silverMaterial);
            oprawa.position.y = srednicaRing;
            ringGroup.add(oprawa);

            const zdjecieGeo = new THREE.CircleGeometry(srednicaWewMiseczki, 64);
            const zdjecie = new THREE.Mesh(zdjecieGeo, photoMaterial);
            zdjecie.rotation.x = -Math.PI / 2;
            zdjecie.position.y = oprawa.position.y + (glebokoscMiseczki / 2) - 0.1;
            ringGroup.add(zdjecie);
        }

        zbudujPierscionek();

        // --- OBSŁUGA KADROWANIA I PRZYCISKU ---
        let cropper;
        const input = document.getElementById('photo-input');
        const img = document.getElementById('image-to-crop');
        const cropContainer = document.getElementById('cropper-container');

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    img.src = event.target.result;
                    cropContainer.style.display = 'block';
                    if(cropper) cropper.destroy();
                    cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1, guides: false, cropBoxMovable: false, cropBoxResizable: false });
                };
                reader.readAsDataURL(file);
            }
        });

        // NAPRAWIONY PRZYCISK
        document.getElementById('apply-crop').addEventListener('click', () => {
            if(!cropper) return;
            const canvas = cropper.getCroppedCanvas({ width: 512, height: 512 });
            const texture = new THREE.CanvasTexture(canvas);
            photoMaterial.map = texture;
            photoMaterial.needsUpdate = true;
            console.log("Zdjęcie nałożone!"); 
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if(cropContainer.style.display !== 'block') ringGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
