<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NIDORA | Konfigurator Pierścionka</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; /* POWRÓT DO CZARNEGO TŁA */
            color: white; /* BIAŁY TEKST NA CZARNYM TLE */
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
        }

        /* LEWA STRONA - 3D */
        .configurator-area {
            flex: 2;
            position: relative;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); /* CIEMNY GRADIENT TŁA */
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #canvas-container:active { cursor: grabbing; }

        /* PRAWA STRONA - MENU */
        .sidebar {
            flex: 1;
            background-color: #0c0d10; /* CHŁODNY CIEMNY PASEK */
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .top-nav a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            display: inline-block;
            transition: 0.3s;
        }
        .top-nav a:hover { color: white; }

        .sidebar h2 {
            font-weight: 200;
            letter-spacing: 0.3rem;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .model-card {
            background: rgba(255, 255, 255, 0.03); /* LEKKO PRZEZROCZYSTE KARTY */
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .model-card:hover, .model-card.active {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.07);
        }

        .model-card h3 {
            margin: 0 0 5px 0;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 0.1rem;
            color: white;
        }

        .model-card p {
            margin: 0;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }

        /* Sekcja wgrywania i kadrowania */
        .customization-section {
            margin-top: 20px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 15px 20px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }

        .action-btn:hover {
            background: white;
            color: black;
        }

        .action-btn.primary {
            background: white;
            color: black;
            margin-top: 15px;
            font-weight: 400;
        }
        
        .action-btn.primary:hover {
            background: #eee;
        }

        #photo-input { display: none; }

        /* Edytor zdjęć */
        #cropper-container {
            display: none;
            margin-top: 20px;
        }

        .img-container {
            width: 100%;
            max-height: 300px;
            background-color: #222; /* CIEMNE TŁO DLA CROPPERA */
            margin-bottom: 15px;
        }

        .img-container img {
            max-width: 100%;
        }

        .cropper-view-box,
        .cropper-face {
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="configurator-area">
        <div id="canvas-container"></div>
    </div>

    <div class="sidebar">
        <div class="top-nav">
            <a href="produkty.html">← Wróć do produktów</a>
        </div>
        
        <h2>1. Kształt</h2>
        
        <div class="model-card active" onclick="zmienModel('klasyczny')">
            <h3>Model Klasyczny</h3>
            <p>Okrągłe oczko, chuda obrączka.</p>
        </div>
        
        <div class="model-card" onclick="zmienModel('masywny')">
            <h3>Sygnet Wspomnień</h3>
            <p>Masywniejsza forma, grubsza obrączka.</p>
        </div>

        <div class="customization-section">
            <h2>2. Twoje Wspomnienie</h2>
            
            <label for="photo-input" class="action-btn">Wybierz zdjęcie</label>
            <input type="file" id="photo-input" accept="image/*">
            
            <div id="cropper-container">
                <p style="font-size: 0.8rem; margin-bottom: 10px; color: rgba(255, 255, 255, 0.6);">Przesuń i powiększ zdjęcie, aby dopasować je do okrągłego oczka:</p>
                <div class="img-container">
                    <img id="image-to-crop" src="">
                </div>
                <button id="apply-crop" class="action-btn primary">Nałóż na pierścionek</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        // --- USTAWIENIA SCENY 3D ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 15, 30); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;

        // --- OŚWIETLENIE SREBRA ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1);
        dirLight1.position.set(10, 20, 10);
        scene.add(dirLight1);
        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight2.position.set(-15, 5, -15);
        scene.add(dirLight2);
        const dirLight3 = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight3.position.set(0, -10, 15);
        scene.add(dirLight3);

        // --- MAGIA SREBRNEGO POŁYSKU ---
        // Używamy standardowej mapy odbić, żeby metal wyglądał na metal
        const textureLoader = new THREE.TextureLoader();
        const silverEnvMap = textureLoader.load('https://threejs.org/examples/textures/cube/pisa/px.png'); // Używamy chłodnego odbicia (jako envMap)

        // --- MATERIAŁY ---
        const silverMaterial = new THREE.MeshPhongMaterial({
            color: 0xdddddd, specular: 0xffffff, shininess: 100,
            envMap: silverEnvMap, // Dodajemy mapę środowiskową dla odbić
            combine: THREE.MultiplyOperation,
            reflectivity: 0.1 // Chłodne, jasne odbicia metalu
        });

        const photoMaterial = new THREE.MeshPhongMaterial({
            color: 0xaaaaaa, specular: 0x333333, shininess: 10
        });

        // --- BUDOWA PIERŚCIONKA ---
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        function zbudujPierscionek(gruboscObraczki, rozmiarKorony, rozmiarZdjecia, glebokoscZaglebienia) {
            while(ringGroup.children.length > 0) ringGroup.remove(ringGroup.children[0]); 

            // CHUDA OBRĄCZKA
            const obraczkaGeo = new THREE.TorusGeometry(6, gruboscObraczki, 64, 100);
            const obraczka = new THREE.Mesh(obraczkaGeo, silverMaterial);
            ringGroup.add(obraczka);

            // MNIEJSZA KORONA (ZMNIEJSZONO ROZMIAR Z 3.0 DO 2.0 I ZWIĘKSZONO ŚREDNICĘ ZDJĘCIA Z 2.0 DO 2.5, BY STWORZYĆ ZAGŁĘBIENIE)
            const oprawaGeo = new THREE.CylinderGeometry(rozmiarKorony, rozmiarKorony * 0.9, glebokoscZaglebienia, 64);
            const oprawa = new THREE.Mesh(oprawaGeo, silverMaterial);
            // Kładziemy oprawę równiutko na górnej krawędzi chudej obrączki
            oprawa.position.y = 6 + (gruboscObraczki * 0.5) - (glebokoscZaglebienia * 0.5);
            ringGroup.add(oprawa);

            // SAMO ZDJĘCIE (OSADZONE NIŻEJ, W ZAGŁĘBIENIU)
            const zdjecieGeo = new THREE.CircleGeometry(rozmiarZdjecia, 64);
            const zdjeciePowierzchnia = new THREE.Mesh(zdjecieGeo, photoMaterial);
            zdjeciePowierzchnia.rotation.x = -Math.PI / 2;
            // Zdjęcie jest teraz fizycznie obniżone wewnątrz srebrnej krawędzi
            zdjeciePowierzchnia.position.y = oprawa.position.y + glebokoscZaglebienia * 0.35 + 0.1; 
            ringGroup.add(zdjeciePowierzchnia);
            
            // Lekko pochylamy cały model na start
            ringGroup.rotation.x = 0.4;
            ringGroup.rotation.y = -0.4;
        }

        // Startujemy z klasycznym, chudym modelem
        zbudujPierscionek(0.3, 2.5, 2.0, 1); // grubosc, korona, zdjecie, glebokosc

        // --- ZMIANA MODELU ---
        window.zmienModel = function(typ) {
            document.querySelectorAll('.model-card').forEach(karta => karta.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (typ === 'klasyczny') zbudujPierscionek(0.3, 2.5, 2.0, 1); // Cieniutka obrączka
            else if (typ === 'masywny') zbudujPierscionek(0.6, 2.5, 2.0, 1.2); // Nieco grubsza obrączka
        };

        // --- KADROWANIE ZDJĘCIA (CROPPER.JS) ---
        let cropper; 
        const imageToCrop = document.getElementById('image-to-crop');
        const cropperContainer = document.getElementById('cropper-container');

        document.getElementById('photo-input').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imageToCrop.src = e.target.result;
                    cropperContainer.style.display = 'block';

                    if (cropper) {
                        cropper.destroy();
                    }

                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: 1,
                        viewMode: 1,
                        dragMode: 'move',
                        guides: false,
                        center: false,
                        cropBoxMovable: false,
                        cropBoxResizable: false,
                        toggleDragModeOnDblclick: false
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('apply-crop').addEventListener('click', function() {
            if (!cropper) return;

            const croppedCanvas = cropper.getCroppedCanvas({
                width: 512, 
                height: 512
            });

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(croppedCanvas.toDataURL(), function(texture) {
                photoMaterial.map = texture;
                photoMaterial.color.setHex(0xffffff); 
                photoMaterial.needsUpdate = true;
            });
        });

        // --- ANIMACJA ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            if(cropperContainer.style.display !== 'block') {
                ringGroup.rotation.y += 0.002;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
