<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NIDORA | Konfigurator 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; display: flex; }
        .configurator-area { flex: 2; position: relative; background: radial-gradient(circle at center, #151515 0%, #000 100%); }
        #canvas-container { width: 100%; height: 100%; cursor: grab; }
        .sidebar { flex: 1; background-color: #0a0a0a; border-left: 1px solid #222; padding: 30px; overflow-y: auto; box-sizing: border-box; }
        .top-nav a { color: #666; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; display: block; }
        h2 { font-weight: 200; letter-spacing: 3px; font-size: 1.2rem; text-transform: uppercase; margin: 20px 0; }
        .model-card { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .model-card.active { border-color: #fff; background: #1a1a1a; }
        .action-btn { background: #fff; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-family: 'Montserrat'; font-weight: 400; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .action-btn.secondary { background: transparent; color: #fff; border: 1px solid #444; }
        #cropper-container { display: none; margin-top: 20px; }
        .img-container { width: 100%; max-height: 250px; background: #111; margin-bottom: 10px; }
        .cropper-view-box, .cropper-face { border-radius: 50%; }
    </style>
</head>
<body>

    <div class="configurator-area">
        <div id="canvas-container"></div>
    </div>

    <div class="sidebar">
        <a href="produkty.html">← POWRÓT</a>
        <h2>1. WYBIERZ MODEL</h2>
        <div class="model-card active" onclick="zmienModel('realny')">
            <h3>Model Precyzyjny</h3>
            <p>Śr. 19.8mm | Drut 1.9mm</p>
        </div>

        <div class="customization-section">
            <h2>2. ZDJĘCIE</h2>
            <label for="photo-input" class="action-btn secondary">WYBIERZ PLIK</label>
            <input type="file" id="photo-input" accept="image/*">
            
            <div id="cropper-container">
                <div class="img-container"><img id="image-to-crop"></div>
                <button id="apply-crop" class="action-btn">ZASTOSUJ KADROWANIE</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 12, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping; // Poprawia wygląd metalu
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // OŚWIETLENIE - kluczowe dla efektu srebra
        const light1 = new THREE.PointLight(0xffffff, 1);
        light1.position.set(10, 20, 10);
        scene.add(light1);
        const light2 = new THREE.PointLight(0xffffff, 0.8);
        light2.position.set(-10, -10, 10);
        scene.add(light2);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        // MATERIAŁ SREBRA
        const silverMaterial = new THREE.MeshStandardMaterial({
            color: 0xc0c0c0,
            metalness: 1.0,  // Maksymalny metal
            roughness: 0.15, // Gładkość (połysk)
        });

        const photoMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });

        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        function zbudujPierscionek() {
            while(ringGroup.children.length > 0) ringGroup.remove(ringGroup.children[0]);

            // Dane z Twojej specyfikacji (przeliczone na skalę modelu)
            const drutGrubosc = 0.95; // Połowa z 1.90mm grubości drutu
            const ringRadius = 9.9;   // Połowa z 19.80mm długości/średnicy
            const miseczkaSrWew = 2.05; // Połowa z 4.10mm
            const miseczkaGlebokosc = 1.8;

            // 1. OBRĄCZKA (Tor)
            const ringGeo = new THREE.TorusGeometry(ringRadius, drutGrubosc, 32, 100);
            const ring = new THREE.Mesh(ringGeo, silverMaterial);
            ringGroup.add(ring);

            // 2. MISECZKA (Cylinder z otworem)
            const cupGeo = new THREE.CylinderGeometry(miseczkaSrWew + 0.5, miseczkaSrWew + 0.4, miseczkaGlebokosc, 64);
            const cup = new THREE.Mesh(cupGeo, silverMaterial);
            cup.position.y = ringRadius; // Ustawienie na szczycie obrączki
            ringGroup.add(cup);

            // 3. DNA MISECZKI / ZDJĘCIE (Obniżone o 0.5mm w głąb miseczki)
            const photoGeo = new THREE.CircleGeometry(miseczkaSrWew, 64);
            const photo = new THREE.Mesh(photoGeo, photoMaterial);
            photo.rotation.x = -Math.PI / 2;
            photo.position.y = ringRadius + (miseczkaGlebokosc / 2) - 0.2; 
            ringGroup.add(photo);

            ringGroup.rotation.x = 0.5;
        }

        zbuilt = zbudujPierscionek();

        // KROPIENIE I TEKSTURA
        let cropper;
        const imgInput = document.getElementById('photo-input');
        const imgToCrop = document.getElementById('image-to-crop');
        const cropBox = document.getElementById('cropper-container');

        imgInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imgToCrop.src = event.target.result;
                    cropBox.style.display = 'block';
                    if(cropper) cropper.destroy();
                    cropper = new Cropper(imgToCrop, { aspectRatio: 1, viewMode: 1, guides: false, cropBoxMovable: false, cropBoxResizable: false });
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('apply-crop').onclick = () => {
            const canvas = cropper.getCroppedCanvas({ width: 512, height: 512 });
            const tex = new THREE.CanvasTexture(canvas);
            photoMaterial.map = tex;
            photoMaterial.color.setHex(0xffffff);
            photoMaterial.needsUpdate = true;
            cropBox.style.display = 'none';
        };

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if(cropBox.style.display !== 'block') ringGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    </script>
</body>
</html>
