<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NIDORA | Konfigurator Pierścionka</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
        }

        .configurator-area {
            flex: 2;
            position: relative;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #canvas-container:active { cursor: grabbing; }

        .upload-ui {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .upload-btn {
            background: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 15px 40px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-btn:hover {
            background: white;
            color: black;
        }

        #photo-input { display: none; }

        .sidebar {
            flex: 1;
            background-color: #0a0a0a;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .top-nav a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            display: inline-block;
            transition: 0.3s;
        }
        .top-nav a:hover { color: white; }

        .sidebar h2 {
            font-weight: 200;
            letter-spacing: 0.3rem;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .model-card {
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .model-card:hover, .model-card.active {
            border-color: rgba(255, 255, 255, 0.8);
            background: #1a1a1a;
        }

        .model-card h3 {
            margin: 0 0 10px 0;
            font-weight: 300;
            letter-spacing: 0.1rem;
        }

        .model-card p {
            margin: 0;
            font-size: 0.85rem;
            color: #888;
            font-weight: 200;
        }
    </style>
</head>
<body>

    <div class="configurator-area">
        <div id="canvas-container"></div>
        
        <div class="upload-ui">
            <label for="photo-input" class="upload-btn">Wgraj swoje zdjęcie</label>
            <input type="file" id="photo-input" accept="image/*">
            <p style="font-size: 0.7rem; color: #666; letter-spacing: 0.1rem; margin-top: 15px;">Możesz obracać model myszką</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="top-nav">
            <a href="produkty.html">← Powrót do produktów</a>
        </div>
        
        <h2>Wybierz model</h2>
        
        <div class="model-card active" onclick="zmienModel('klasyczny')">
            <h3>Model Klasyczny</h3>
            <p>Okrągłe oczko, delikatna obrączka.</p>
        </div>
        
        <div class="model-card" onclick="zmienModel('masywny')">
            <h3>Sygnet Wspomnień</h3>
            <p>Masywniejsza forma, grubsza obrączka.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 15, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;

        // --- ZMIENIONE OŚWIETLENIE ---
        // Dodajemy więcej świateł z różnych stron, aby srebro ładnie błyszczało
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1);
        dirLight1.position.set(10, 20, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight2.position.set(-15, 5, -15);
        scene.add(dirLight2);
        
        const dirLight3 = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight3.position.set(0, -10, 15);
        scene.add(dirLight3);

        // --- ZMIENIONE MATERIAŁY ---
        // MeshPhongMaterial ignoruje brak otoczenia i ładnie "udaje" błyszczący metal
        const silverMaterial = new THREE.MeshPhongMaterial({
            color: 0xdddddd,
            specular: 0xffffff, // Ostre, białe odblaski
            shininess: 100 // Wysoki połysk
        });

        const photoMaterial = new THREE.MeshPhongMaterial({
            color: 0x111111,
            specular: 0x333333,
            shininess: 10
        });

        // --- ZMIENIONE TWORZENIE PIERŚCIONKA ---
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        function zbudujPierscionek(gruboscObraczki, rozmiarOczka) {
            while(ringGroup.children.length > 0){ 
                ringGroup.remove(ringGroup.children[0]); 
            }

            // Zwiększyłem liczbę segmentów z 32 na 64, żeby krawędzie były gładsze
            const obraczkaGeo = new THREE.TorusGeometry(6, gruboscObraczki, 64, 100);
            const obraczka = new THREE.Mesh(obraczkaGeo, silverMaterial);
            // Obrączka stoi w pionie (usunięto rotację)
            ringGroup.add(obraczka);

            // Oprawa na zdjęcie
            const oprawaGeo = new THREE.CylinderGeometry(rozmiarOczka + 0.5, rozmiarOczka + 0.3, 1, 64);
            const oprawa = new THREE.Mesh(oprawaGeo, silverMaterial);
            // Kładziemy oprawę równiutko na górnej krawędzi obrączki
            oprawa.position.y = 6 + (gruboscObraczki * 0.5); 
            ringGroup.add(oprawa);

            // Miejsce na zdjęcie
            const zdjecieGeo = new THREE.CircleGeometry(rozmiarOczka, 64);
            const zdjeciePowierzchnia = new THREE.Mesh(zdjecieGeo, photoMaterial);
            zdjeciePowierzchnia.rotation.x = -Math.PI / 2;
            // Kładziemy je tuż nad oprawą
            zdjeciePowierzchnia.position.y = oprawa.position.y + 0.51; 
            ringGroup.add(zdjeciePowierzchnia);
            
            // Lekko pochylamy cały model na start, żeby od razu było widać oczko
            ringGroup.rotation.x = 0.4;
            ringGroup.rotation.y = -0.4;
        }

        zbudujPierscionek(1.2, 3);

        window.zmienModel = function(typ) {
            document.querySelectorAll('.model-card').forEach(karta => karta.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if (typ === 'klasyczny') {
                zbudujPierscionek(1.2, 3);
            } else if (typ === 'masywny') {
                zbudujPierscionek(2.5, 4.5);
            }
        };

        document.getElementById('photo-input').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const textureLoader = new THREE.TextureLoader();
                    textureLoader.load(e.target.result, function(texture) {
                        photoMaterial.map = texture;
                        photoMaterial.color.setHex(0xffffff); 
                        photoMaterial.needsUpdate = true;
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            ringGroup.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
